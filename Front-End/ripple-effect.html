<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Interactive Ripple Search</title>
    <style>
        :root {
            /* Dark mode theme (Default) */
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --search-bg: rgba(255, 255, 255, 0.03);
            --search-border: rgba(255, 255, 255, 0.08);
            --shadow-color: rgba(0, 0, 0, 0.4);
            
            /* Cyan/Blue liquid gradient for the wave */
            --ripple-color: radial-gradient(circle, 
                rgba(56, 189, 248, 0.4) 0%, 
                rgba(14, 165, 233, 0.15) 30%, 
                rgba(2, 132, 199, 0.05) 60%, 
                transparent 100%);
            
            --pattern-color: rgba(255, 255, 255, 0.04);
        }

        /* Light mode support */
        @media (prefers-color-scheme: light) {
            :root {
                --bg-color: #f0f9ff;
                --text-color: #0f172a;
                --search-bg: rgba(255, 255, 255, 0.7);
                --search-border: rgba(0, 0, 0, 0.08);
                --shadow-color: rgba(0, 0, 0, 0.08);
                
                --ripple-color: radial-gradient(circle, 
                    rgba(14, 165, 233, 0.3) 0%, 
                    rgba(56, 189, 248, 0.15) 30%, 
                    rgba(125, 211, 252, 0.05) 60%, 
                    transparent 100%);
                    
                --pattern-color: rgba(0, 0, 0, 0.04);
            }
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            transition: background-color 0.4s ease;
            
            /* Dotted background pattern to make the blur effect visible */
            background-image: radial-gradient(var(--pattern-color) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        /* Container ensures the search bar stays above the wave */
        .search-container {
            position: relative;
            z-index: 10;
        }

        .search-bar {
            width: 380px;
            padding: 16px 28px;
            font-size: 1.1rem;
            border-radius: 60px;
            border: 1px solid var(--search-border);
            background: var(--search-bg);
            color: var(--text-color);
            
            /* Glassmorphism */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 4px 24px var(--shadow-color);
            outline: none;
            
            /* Smooth fluid transitions */
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .search-bar::placeholder {
            color: var(--text-color);
            opacity: 0.5;
            transition: opacity 0.3s ease;
        }

        /* Hover: Subtle lift and more shadow */
        .search-bar:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px var(--shadow-color);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(56, 189, 248, 0.3);
        }

        @media (prefers-color-scheme: light) {
            .search-bar:hover {
                background: rgba(255, 255, 255, 0.9);
            }
        }

        /* Focus Details: Scale up and distinct border glow */
        .search-bar:focus {
            transform: scale(1.04) translateY(-2px);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.3), 0 16px 40px var(--shadow-color);
            border-color: rgba(56, 189, 248, 0.8);
        }

        .search-bar:focus::placeholder {
            opacity: 0.3;
        }

        /* Wave Effect Styling */
        .liquid-wave {
            position: fixed;
            border-radius: 50%;
            pointer-events: none; /* Let clicks pass through to other elements underneath */
            z-index: 1;
            
            /* The element grows and fades */
            animation: expandFluidWave 2s cubic-bezier(0.15, 0.85, 0.35, 1.2) forwards;
            
            /* Center the wave at its left/top coordinates and start small */
            transform-origin: center center;
            transform: translate(-50%, -50%) scale(0.01);
            
            /* Background gradient */
            background: var(--ripple-color);
            
            /* Backdrop blur to distort the background like water */
            backdrop-filter: blur(6px) saturate(120%);
            -webkit-backdrop-filter: blur(6px) saturate(120%);
        }

        /* Keyframes for the expanding fluid wave */
        @keyframes expandFluidWave {
            0% {
                transform: translate(-50%, -50%) scale(0.01);
                opacity: 0.8;
            }
            50% {
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="search-container">
        <input type="text" class="search-bar" placeholder="Search anything..." autocomplete="off">
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const searchBar = document.querySelector('.search-bar');

            // Listen for mousedown to trigger wave on interaction
            searchBar.addEventListener('mousedown', (e) => {
                createFluidWave(e);
            });

            function createFluidWave(e) {
                const wave = document.createElement('div');
                wave.classList.add('liquid-wave');

                // Get click coordinates relative to viewport
                const clickX = e.clientX;
                const clickY = e.clientY;

                // To ensure wave reaches all screen corners, 
                // calculate distance to the farthest corner
                const distanceToCorners = [
                    getDistance(clickX, clickY, 0, 0),                                  // Top Left
                    getDistance(clickX, clickY, window.innerWidth, 0),                  // Top Right
                    getDistance(clickX, clickY, 0, window.innerHeight),                 // Bottom Left
                    getDistance(clickX, clickY, window.innerWidth, window.innerHeight)  // Bottom Right
                ];
                
                const maxDistance = Math.max(...distanceToCorners);
                
                // The diameter needs to be 2 * max distance to fully enclose the screen
                const diameter = maxDistance * 2;
                
                wave.style.width = `${diameter}px`;
                wave.style.height = `${diameter}px`;
                wave.style.left = `${clickX}px`;
                wave.style.top = `${clickY}px`;
                
                document.body.appendChild(wave);
                
                // Clean up the DOM element after animation ends
                wave.addEventListener('animationend', () => {
                    wave.remove();
                });
            }

            // Helper to calculate Euclidean distance
            function getDistance(x1, y1, x2, y2) {
                return Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
            }
        });
    </script>
</body>
</html>
